<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ماك | MAC</title>
    <!-- استيراد أيقونات FontAwesome للمظهر العصري -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* --- الهوية البصرية لمطعم ماك --- */
        :root {
            --brand-red: #dc2626; /* اللون الأحمر للرأس والقاع */
            --brand-green: #22c55e; /* الأخضر الجديد لدائرة رقم السلة */
            --dark-color: #000000; /* التسمية والوصف بالأسود */
            --white: #ffffff;
            --light-bg: #ffffff; /* جسم الموقع باللون الأبيض */
            --border-radius: 12px;
            --transition: all 0.3s ease;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--light-bg);
            color: var(--dark-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* --- المستطيل الأحمر العلوي (رأس الموقع) --- */
        .hero-header {
            background-color: var(--brand-red);
            color: var(--white);
            padding: 15px 5%;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            width: 100%;
        }

        .header-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .logo-section {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .logo-box h1 {
            font-size: 26px;
            font-weight: 900;
        }

        /* تكبير الجملة اللفظية تحت الشعار */
        .slogan {
            font-size: 16px; /* تكبير الحجم */
            font-weight: 600;
            opacity: 0.95;
            margin-top: 5px;
        }

        .nav-controls {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* أزرار الهيدر الشفافة والبيضاء */
        .btn-header {
            background-color: rgba(255, 255, 255, 0.15);
            border: 1.5px solid var(--white);
            color: var(--white);
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: var(--transition);
        }

        .btn-header:hover {
            background-color: var(--white);
            color: var(--brand-red);
        }

        /* تعديل دائرة الرقم لتصبح خضراء والرقم بداخلها أبيض */
        .cart-badge {
            background-color: var(--brand-green);
            color: var(--white);
            border-radius: 50%;
            padding: 2px 7px;
            font-size: 11px;
            font-weight: bold;
        }

        /* --- منطقة قائمة الطعام (بيضاء بالكامل) --- */
        .menu-section {
            background-color: var(--white);
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
            flex: 1;
            width: 100%;
        }

        .section-title {
            text-align: center;
            margin-bottom: 30px;
            font-size: 28px;
            font-weight: 800;
            color: var(--dark-color);
            position: relative;
        }

        .section-title::after {
            content: '';
            display: block;
            width: 60px;
            height: 4px;
            background-color: var(--brand-red);
            margin: 8px auto 0;
            border-radius: 2px;
        }

        /* شبكة المنتجات */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
        }

        .product-card {
            background-color: var(--white);
            border: 1px solid #e2e8f0;
            border-radius: var(--border-radius);
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            transition: var(--transition);
            display: flex;
            flex-direction: column;
        }

        .product-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            border-color: var(--brand-red);
        }

        .product-img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        /* لون أسود للتسمية والوصف */
        .product-title {
            font-size: 18px;
            color: var(--dark-color);
            margin-bottom: 8px;
            font-weight: 700;
        }

        .product-desc {
            font-size: 13px;
            color: var(--dark-color);
            margin-bottom: 12px;
            line-height: 1.5;
        }

        .product-price {
            font-size: 16px;
            font-weight: 800;
            color: var(--brand-red);
            margin-bottom: 15px;
        }

        /* زر الإضافة إلى السلة */
        .btn-add-cart {
            background-color: var(--brand-red);
            color: var(--white);
            border: none;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: var(--transition);
            margin-top: auto;
            font-size: 14px;
        }

        .btn-add-cart:hover {
            background-color: #b91c1c;
        }

        /* --- المستطيل الأحمر السفلي (قاع الموقع) - مصفوف بشكل أفقي عرضي --- */
        .footer-section {
            background-color: var(--brand-red);
            color: var(--white);
            padding: 20px 5%;
            width: 100%;
            margin-top: auto;
        }

        .footer-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-direction: row; /* مصفوفة بشكل أفقي عرضي تملأ الشاشة */
            justify-content: space-around; /* توزيع متناسق على عرض الشاشة */
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .footer-item {
            font-size: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
        }

        .footer-item a {
            color: var(--white);
            text-decoration: none;
            transition: var(--transition);
        }

        .footer-item a:hover {
            color: #facc15;
        }

        /* المظهر المتجاوب للهواتف لضمان الترتيب العرضي */
        @media (max-width: 600px) {
            .footer-container {
                flex-direction: column;
                gap: 12px;
                text-align: center;
            }
        }

        /* --- سلة المشتريات الجانبية --- */
        .cart-sidebar {
            position: fixed;
            top: 0;
            left: -400px;
            width: 380px;
            height: 100%;
            background-color: var(--white);
            box-shadow: 5px 0 25px rgba(0,0,0,0.15);
            z-index: 2000;
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            padding: 20px;
            color: var(--dark-color);
        }

        html[dir="rtl"] .cart-sidebar {
            left: auto;
            right: -400px;
        }

        .cart-sidebar.open {
            left: 0;
        }

        html[dir="rtl"] .cart-sidebar.open {
            left: auto;
            right: 0;
        }

        .cart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #f1f5f9;
            padding-bottom: 15px;
            margin-bottom: 15px;
        }

        .btn-close-cart {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: var(--dark-color);
        }

        .cart-items {
            flex-grow: 1;
            overflow-y: auto;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #f1f5f9;
        }

        .item-qty-controls {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 5px;
        }

        .btn-qty {
            background-color: #f3f4f6;
            border: 1px solid #d1d5db;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .cart-footer {
            border-top: 2px solid #e5e7eb;
            padding-top: 15px;
            margin-top: 15px;
        }

        .cart-total-row {
            display: flex;
            justify-content: space-between;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .btn-whatsapp-checkout {
            background-color: #25d366;
            color: var(--white);
            border: none;
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: var(--transition);
        }

        .btn-whatsapp-checkout:hover {
            background-color: #128c7e;
        }
    </style>
</head>
<body>

    <!-- المستطيل الأحمر العلوي (دون إيموجي البرجر وشعار لفظي مكبر) -->
    <header class="hero-header">
        <div class="header-container">
            <div class="logo-section">
                <div class="logo-box">
                    <h1 id="logo-text">ماك | MAC</h1>
                </div>
                <div class="slogan" id="slogan-text">تذوقه انك تحبه | taste it , of course you like it</div>
            </div>
            
            <div class="nav-controls">
                <button class="btn-header" onclick="toggleLanguage()">
                    <i class="fa-solid fa-globe"></i>
                    <span id="lang-btn-text">English</span>
                </button>
                <button class="btn-header" onclick="toggleCart()">
                    <i class="fa-solid fa-cart-shopping"></i>
                    <span id="cart-btn-text">السلة</span>
                    <span class="cart-badge" id="cart-count">0</span>
                </button>
            </div>
        </div>
    </header>

    <!-- منطقة قائمة الطعام (بيضاء بالكامل) -->
    <main class="menu-section">
        <h2 class="section-title" id="menu-title">قائمة الوجبات</h2>
        
        <div class="products-grid" id="products-grid">
            <!-- الأصناف تضاف تلقائياً بواسطة الجافاسكريبت -->
        </div>
    </main>

    <!-- المستطيل الأحمر السفلي مصفوف بشكل عرضي أفقي ممتد وحساب إنستغرام savrx2 -->
    <footer class="footer-section">
        <div class="footer-container">
            <!-- الرقم المجاني للتواصل -->
            <div class="footer-item">
                <i class="fa-solid fa-phone"></i>
                <span id="footer-phone-label">الرقم المجاني للتواصل:</span>
                <a href="tel:+96879277221" dir="ltr">+968 79277221</a>
            </div>
            <!-- حساب الإنستغرام الجديد savrx2 -->
            <div class="footer-item">
                <i class="fa-brands fa-instagram"></i>
                <span>Instagram:</span>
                <a href="https://instagram.com/savrx2" target="_blank">@savrx2</a>
            </div>
        </div>
    </footer>

    <!-- سلة المشتريات الجانبية -->
    <div class="cart-sidebar" id="cart-sidebar">
        <div class="cart-header">
            <h3 id="cart-title">سلة المشتريات</h3>
            <button class="btn-close-cart" onclick="toggleCart()">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>
        
        <div class="cart-items" id="cart-items-list">
            <!-- الوجبات المضافة -->
        </div>

        <div class="cart-footer">
            <div class="cart-total-row">
                <span id="total-label">المجموع الإجمالي:</span>
                <span id="cart-total-value">0.000 ر.ع</span>
            </div>
            <button class="btn-whatsapp-checkout" onclick="sendToWhatsApp()">
                <i class="fa-brands fa-whatsapp"></i>
                <span id="checkout-btn-text">إرسال الفاتورة عبر الواتساب</span>
            </button>
        </div>
    </div>

    <!-- الجزء البرمجي الذكي لإدارة السلة واللغات والواتساب -->
    <script>
        // --- قاعدة بيانات الأصناف المحدثة بدقة مع صورة البطاطا السادة بدون إضافات ---
        const products = [
            {
                id: 1,
                nameAr: "برجر ماك لحم",
                nameEn: "Mac meat burger",
                descAr: "شريحتين خبز محمر عدل عليهم لحم مشوي صح و شرايح الخس الأمريكي مع صوص ماك الخاص",
                descEn: "two pieces of tosted bread with a full piece of juicy melted meat and the lettuce with special Mac sus sauce",
                price: 1.400, 
                image: "https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=600"
            },
            {
                id: 2,
                nameAr: "بطاطا مقليه",
                nameEn: "fries",
                descAr: "بطاطا مقليه عليهم رشه ملح السعاده",
                descEn: "fried fries with happy salt flavor",
                price: 1.000, 
                // صورة بطاطا مقلية سادة واحترافية بدون إضافات فوقها
                image: "https://images.unsplash.com/photo-1630384060421-cb20d0e0649d?w=600"
            }
        ];

        const translations = {
            ar: {
                logo: "ماك | MAC",
                slogan: "تذوقه انك تحبه | taste it , of course you like it",
                menuTitle: "قائمة الوجبات",
                langBtn: "English",
                cartBtn: "السلة",
                cartTitle: "سلة المشتريات",
                totalLabel: "المجموع الإجمالي:",
                checkoutBtn: "إرسال الفاتورة عبر الواتساب",
                addToCart: "إضافة للسلة",
                currency: "ر.ع",
                phoneLabel: "الرقم المجاني للتواصل:"
            },
            en: {
                logo: "MAC | ماك",
                slogan: "taste it , of course you like it",
                menuTitle: "Our Menu",
                langBtn: "العربية",
                cartBtn: "Cart",
                cartTitle: "Your Cart",
                totalLabel: "Total Amount:",
                checkoutBtn: "Send Bill via WhatsApp",
                addToCart: "Add to Cart",
                currency: "OMR",
                phoneLabel: "Toll-Free Phone:"
            }
        };

        let currentLang = "ar";
        let cart = [];
        const restaurantWhatsAppNumber = "96879277221"; 

        function renderMenu() {
            const grid = document.getElementById("products-grid");
            grid.innerHTML = "";

            products.forEach(product => {
                const name = currentLang === "ar" ? product.nameAr : product.nameEn;
                const desc = currentLang === "ar" ? product.descAr : product.descEn;
                const currency = translations[currentLang].currency;
                
                const card = document.createElement("div");
                card.className = "product-card";
                card.innerHTML = `
                    <img src="${product.image}" alt="${name}" class="product-img">
                    <div class="product-info">
                        <h3 class="product-title">${name}</h3>
                        <p class="product-desc">${desc}</p>
                        <div class="product-price">${product.price.toFixed(3)} ${currency}</div>
                        <button class="btn-add-cart" onclick="addToCart(${product.id})">
                            <i class="fa-solid fa-cart-plus"></i> ${translations[currentLang].addToCart}
                        </button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function toggleCart() {
            const sidebar = document.getElementById("cart-sidebar");
            sidebar.classList.toggle("open");
        }

        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            const cartItem = cart.find(item => item.id === productId);

            if (cartItem) {
                cartItem.quantity++;
            } else {
                cart.push({ ...product, quantity: 1 });
            }

            updateCart();
        }

        function updateQuantity(productId, amount) {
            const cartItem = cart.find(item => item.id === productId);
            if (cartItem) {
                cartItem.quantity += amount;
                if (cartItem.quantity <= 0) {
                    cart = cart.filter(item => item.id !== productId);
                }
            }
            updateCart();
        }

        function updateCart() {
            const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
            document.getElementById("cart-count").innerText = totalItems;

            const list = document.getElementById("cart-items-list");
            list.innerHTML = "";

            let totalPrice = 0;
            const currency = translations[currentLang].currency;

            cart.forEach(item => {
                const name = currentLang === "ar" ? item.nameAr : item.nameEn;
                const itemTotal = item.price * item.quantity;
                totalPrice += itemTotal;

                const itemRow = document.createElement("div");
                itemRow.className = "cart-item";
                itemRow.innerHTML = `
                    <div>
                        <h4 style="font-weight: bold;">${name}</h4>
                        <div style="font-size: 12px; color: #555;">${item.price.toFixed(3)} x ${item.quantity}</div>
                        <div class="item-qty-controls">
                            <button class="btn-qty" onclick="updateQuantity(${item.id}, -1)">-</button>
                            <span style="font-weight: bold; font-size: 14px;">${item.quantity}</span>
                            <button class="btn-qty" onclick="updateQuantity(${item.id}, 1)">+</button>
                        </div>
                    </div>
                    <div style="font-weight: bold; color: var(--brand-red)">
                        ${itemTotal.toFixed(3)} ${currency}
                    </div>
                `;
                list.appendChild(itemRow);
            });

            document.getElementById("cart-total-value").innerText = `${totalPrice.toFixed(3)} ${currency}`;
        }

        // صياغة الفاتورة مع التحديث الجديد لرسالة الواتساب وتحديد طريقة الدفع
        function sendToWhatsApp() {
            if (cart.length === 0) {
                alert(currentLang === "ar" ? "سلة المشتريات فارغة حالياً!" : "Your cart is empty!");
                return;
            }

            let billText = currentLang === "ar" ? "🍔 *طلب جديد من مطعم MAC* 🍔\n\n" : "🍔 *New Order from MAC Restaurant* 🍔\n\n";
            let total = 0;

            cart.forEach((item, index) => {
                const name = currentLang === "ar" ? item.nameAr : item.nameEn;
                const itemTotal = item.price * item.quantity;
                total += itemTotal;
                billText += `${index + 1}. *${name}*\n   الكمية: ${item.quantity} | السعر: ${itemTotal.toFixed(3)} ر.ع\n\n`;
            });

            billText += `---------------------------\n`;
            billText += `💰 *المجموع الإجمالي للطلب: ${total.toFixed(3)} ر.ع*\n\n`;
            
            // إضافة التحديث الذكي والجديد بدلاً من "يرجى استلام الفاتورة..."
            billText += currentLang === "ar" 
                ? "🚗 *طريقة الاستلام:* استلام ذاتي من فرع المطعم (لا يوجد توصيل).\n\n💬 سيتواصل معك المطعم لتحديد طريقة الدفع وتجهيز طلبك." 
                : "🚗 *Delivery Type:* Pickup from Restaurant (No delivery).\n\n💬 The restaurant will contact you to determine the payment method and prepare your order.";

            const encodedText = encodeURIComponent(billText);
            const whatsappUrl = `https://api.whatsapp.com/send?phone=${restaurantWhatsAppNumber}&text=${encodedText}`;
            window.open(whatsappUrl, '_blank');
        }

        function toggleLanguage() {
            currentLang = currentLang === "ar" ? "en" : "ar";
            
            const htmlTag = document.documentElement;
            if (currentLang === "en") {
                htmlTag.setAttribute("dir", "ltr");
                htmlTag.setAttribute("lang", "en");
            } else {
                htmlTag.setAttribute("dir", "rtl");
                htmlTag.setAttribute("lang", "ar");
            }

            document.getElementById("logo-text").innerText = translations[currentLang].logo;
            document.getElementById("slogan-text").innerText = translations[currentLang].slogan;
            document.getElementById("lang-btn-text").innerText = translations[currentLang].langBtn;
            document.getElementById("cart-btn-text").innerText = translations[currentLang].cartBtn;
            document.getElementById("menu-title").innerText = translations[currentLang].menuTitle;
            document.getElementById("cart-title").innerText = translations[currentLang].cartTitle;
            document.getElementById("total-label").innerText = translations[currentLang].totalLabel;
            document.getElementById("checkout-btn-text").innerText = translations[currentLang].checkoutBtn;
            document.getElementById("footer-phone-label").innerText = translations[currentLang].phoneLabel;

            renderMenu();
            updateCart();
        }

        window.onload = function() {
            renderMenu();
        };
    </script>
</body>
</html>
